name: Build APK with Custom Package Name

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Change Application ID Only
        run: |
          OLD_ID="eu.faircode.netguard"
          NEW_ID="eu.faircode.netguard.none"
          
          # 只改 applicationId，不改 namespace
          sed -i "s/applicationId = \"${OLD_ID}\"/applicationId = \"${NEW_ID}\"/g" app/build.gradle.kts
          
          # 验证修改
          echo "=== Application ID ==="
          grep "applicationId" app/build.gradle.kts
          echo "=== Namespace (unchanged) ==="
          grep "namespace" app/build.gradle.kts

      - name: Fix Lint Configuration
        run: |
          if grep -q "lint {" app/build.gradle.kts; then
            sed -i '/disable.add("MissingTranslation")/a\        disable.add("ExtraTranslation")' app/build.gradle.kts
          else
            sed -i '/android {/a\    lint {\n        disable.add("MissingTranslation")\n        disable.add("ExtraTranslation")\n    }' app/build.gradle.kts
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.build.abi=arm64-v8a,armeabi-v7a,x86,x86_64 \
            --no-daemon \
            --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: netguard-none-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Build Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: app/build/reports/
          retention-days: 7

