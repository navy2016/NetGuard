name: Build APK with Custom Package Name

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  OLD_PACKAGE: "eu.faircode.netguard"
  NEW_PACKAGE: "eu.faircode.netguard.none"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: true

      # ✅ 修复：禁用 cache-cleanup，使用基础缓存功能
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # 禁用与 Gradle 9+ 不兼容的清理功能
          cache-disabled: false
          # 或者完全省略 gradle-home-cache-cleanup 参数
          # 使用默认的只读/写入缓存模式

      - name: Change Application ID Only
        run: |
          sed -i "s/applicationId = \"${{ env.OLD_PACKAGE }}\"/applicationId = \"${{ env.NEW_PACKAGE }}\"/g" app/build.gradle.kts
          
          echo "=== Verification ==="
          grep -E "applicationId\s*=" app/build.gradle.kts || echo "WARNING: applicationId not found!"
          grep -E "namespace\s*=" app/build.gradle.kts || echo "WARNING: namespace not found!"

      # ✅ 修复：正确配置 Gradle 属性，启用构建缓存
      - name: Setup Gradle Properties
        run: |
          # 备份原始文件
          cp gradle.properties gradle.properties.backup
          
          cat >> gradle.properties << 'EOF'
          
          # CI 优化配置 - 启用构建缓存
          org.gradle.caching=true
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          org.gradle.daemon=false
          org.gradle.jvmargs=-Xmx6g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          
          # Android 构建优化
          android.useAndroidX=true
          android.enableJetifier=true
          
          # Lint 配置 - 通过项目属性禁用
          android.lint.suppressMissingTranslation=true
          android.lint.suppressExtraTranslation=true
          EOF
          
          echo "=== Gradle Properties ==="
          cat gradle.properties

      # ✅ 替代方案：直接在 build.gradle.kts 中添加 lint 配置（如果属性方式无效）
      - name: Configure Lint in Build Script
        run: |
          if ! grep -q "lint {" app/build.gradle.kts; then
            # 在 android { 块内添加 lint 配置
            sed -i '/android {/a\    lint {\n        disable += "MissingTranslation"\n        disable += "ExtraTranslation"\n        abortOnError = false\n    }' app/build.gradle.kts
            echo "Added lint configuration to build.gradle.kts"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      
      - name: Build Release APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          GRADLE_OPTS: "-Dorg.gradle.caching=true -Dorg.gradle.daemon=false"
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.build.abi=arm64-v8a,armeabi-v7a,x86,x86_64 \
            --x lintVitalRelease \
            --x lint \
            --no-daemon \
            --stacktrace
       
      - name: Disable Lint Errors
        run: |
          echo "android.lint.suppressExtraTranslation=true" >> gradle.properties
          echo "android.lint.suppressMissingTranslation=true" >> gradle.properties
     
      - name: Setup Signing
        id: signing
        run: |
          CONFIG="${{ secrets.SIGNING_CONFIG }}"
          
          # 更健壮的解析
          STORE_FILE=$(echo "$CONFIG" | grep -E '^storeFile=' | cut -d'=' -f2 | tr -d ' ')
          STORE_PASSWORD=$(echo "$CONFIG" | grep -E 'storePassword=' | sed -E 's/.*"([^"]*)".*/\1/')
          KEY_ALIAS=$(echo "$CONFIG" | grep -E '^keyAlias=' | cut -d'=' -f2 | tr -d ' ')
          KEY_PASSWORD=$(echo "$CONFIG" | grep -E 'keyPassword=' | sed -E 's/.*"([^"]*)".*/\1/')
          
          if [ -z "$STORE_FILE" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Error: Missing required signing configuration"
            exit 1
          fi
          
          echo "store_file=$STORE_FILE" >> $GITHUB_OUTPUT
          echo "store_password=$STORE_PASSWORD" >> $GITHUB_OUTPUT
          echo "key_alias=$KEY_ALIAS" >> $GITHUB_OUTPUT
          echo "key_password=$KEY_PASSWORD" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > "app/${{ steps.signing.outputs.store_file }}"

      - name: Sign APK
        run: |
          UNSIGNED_APK=$(find app/build -name "*-unsigned.apk" -type f | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "Error: Unsigned APK not found"
            find app/build -name "*.apk" -type f
            exit 1
          fi
          
          mkdir -p app/build/outputs/apk/release
          SIGNED_APK="app/build/outputs/apk/release/app-release-signed.apk"
          
          # 获取最新 build-tools 版本
          BUILD_TOOLS_VERSION=$(ls -1 ${ANDROID_HOME}/build-tools/ 2>/dev/null | sort -V | tail -1)
          if [ -z "$BUILD_TOOLS_VERSION" ]; then
            echo "Error: No build-tools found"
            exit 1
          fi
          
          APK_SIGNER="${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/apksigner"
          echo "Using apksigner version: $BUILD_TOOLS_VERSION"
          
          "$APK_SIGNER" sign \
            --ks "app/${{ steps.signing.outputs.store_file }}" \
            --ks-key-alias "${{ steps.signing.outputs.key_alias }}" \
            --ks-pass pass:"${{ steps.signing.outputs.store_password }}" \
            --key-pass pass:"${{ steps.signing.outputs.key_password }}" \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"
          
          "$APK_SIGNER" verify -v --print-certs "$SIGNED_APK"
          echo "✅ APK signed successfully"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: netguard-none-apk
          path: app/build/outputs/apk/release/*-signed.apk
          retention-days: 30
          
      - name: Cleanup Keystore
        if: always()
        run: |
          STORE_FILE="${{ steps.signing.outputs.store_file }}"
          
          # 安全检查：防止删除整个目录
          if [ -z "$STORE_FILE" ] || [ "$STORE_FILE" = "." ] || [ "$STORE_FILE" = ".." ] || [ "$STORE_FILE" = "/" ]; then
            echo "⚠️  Invalid or empty store file name, skipping keystore cleanup"
            exit 0
          fi
          
          KEYSTORE_PATH="app/$STORE_FILE"
          
          # 确保是文件而不是目录
          if [ -f "$KEYSTORE_PATH" ]; then
            rm -f "$KEYSTORE_PATH"
            echo "✅ Keystore file cleaned up: $KEYSTORE_PATH"
          else
            echo "ℹ️  No keystore file to clean up at: $KEYSTORE_PATH"
          fi


      - name: Upload Build Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            app/build/outputs/logs/
          retention-days: 7

