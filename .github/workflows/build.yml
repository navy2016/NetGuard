name: Build APK with Custom Package Name

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  OLD_PACKAGE: "eu.faircode.netguard"
  NEW_PACKAGE: "eu.faircode.netguard.none"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: true

      # ✅ 使用官方 Gradle Action 替代手动缓存
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"

      - name: Change Application ID Only
        run: |
          # 更精确的替换，避免误伤其他包含该字符串的地方
          sed -i "s/applicationId = \"${{ env.OLD_PACKAGE }}\"/applicationId = \"${{ env.NEW_PACKAGE }}\"/g" app/build.gradle.kts
          
          echo "=== Verification ==="
          echo "Application ID:"
          grep -E "applicationId\s*=" app/build.gradle.kts || echo "WARNING: applicationId not found!"
          echo "Namespace (should remain unchanged):"
          grep -E "namespace\s*=" app/build.gradle.kts || echo "WARNING: namespace not found!"

      - name: Setup Gradle Properties
        run: |
          # 使用 gradle.properties 配置 lint 和构建优化，而非修改 build.gradle.kts
          cat >> gradle.properties << 'EOF'
          
          # CI 优化配置
          org.gradle.caching=true
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          org.gradle.daemon=false
          
          # Lint 配置
          android.lint.suppressMissingTranslation=true
          android.lint.suppressExtraTranslation=true
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.build.abi=arm64-v8a,armeabi-v7a,x86,x86_64 \
            --build-cache \
            --no-daemon \
            --stacktrace

      - name: Setup Signing
        id: signing
        run: |
          # 更安全的密钥解析方式
          CONFIG="${{ secrets.SIGNING_CONFIG }}"
          
          # 使用 awk 进行更健壮的解析
          STORE_FILE=$(echo "$CONFIG" | awk -F'=' '/^storeFile=/ {print $2}' | tr -d ' ')
          STORE_PASSWORD=$(echo "$CONFIG" | awk -F'"' '/storePassword=/ {print $2}')
          KEY_ALIAS=$(echo "$CONFIG" | awk -F'=' '/^keyAlias=/ {print $2}' | tr -d ' ')
          KEY_PASSWORD=$(echo "$CONFIG" | awk -F'"' '/keyPassword=/ {print $2}')
          
          # 验证必要字段
          if [ -z "$STORE_FILE" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Error: Missing required signing configuration"
            echo "storeFile: ${STORE_FILE:-MISSING}"
            echo "keyAlias: ${KEY_ALIAS:-MISSING}"
            exit 1
          fi
          
          echo "store_file=$STORE_FILE" >> $GITHUB_OUTPUT
          echo "store_password=$STORE_PASSWORD" >> $GITHUB_OUTPUT
          echo "key_alias=$KEY_ALIAS" >> $GITHUB_OUTPUT
          echo "key_password=$KEY_PASSWORD" >> $GITHUB_OUTPUT
          
          echo "Store file: $STORE_FILE"
          echo "Key alias: $KEY_ALIAS"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > "app/${{ steps.signing.outputs.store_file }}"
          ls -la "app/${{ steps.signing.outputs.store_file }}"

      - name: Sign APK
        run: |
          # 找到未签名 APK
          UNSIGNED_APK=$(find app/build -name "*-unsigned.apk" -type f | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "Error: Unsigned APK not found"
            find app/build -name "*.apk" -type f
            exit 1
          fi
          echo "Found unsigned APK: $UNSIGNED_APK"
          
          # 创建输出目录
          mkdir -p app/build/outputs/apk/release
          SIGNED_APK="app/build/outputs/apk/release/app-release-signed.apk"
          
          # 使用 apksigner 的完整路径（Android SDK 标准路径）
          BUILD_TOOLS_VERSION=$(ls -1 ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)
          APK_SIGNER="${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/apksigner"
          
          if [ ! -f "$APK_SIGNER" ]; then
            echo "Error: apksigner not found at $APK_SIGNER"
            exit 1
          fi
          echo "Using apksigner: $APK_SIGNER (version $BUILD_TOOLS_VERSION)"
          
          # 签名 APK，启用 v2+v3 签名方案
          "$APK_SIGNER" sign \
            --ks "app/${{ steps.signing.outputs.store_file }}" \
            --ks-key-alias "${{ steps.signing.outputs.key_alias }}" \
            --ks-pass pass:"${{ steps.signing.outputs.store_password }}" \
            --key-pass pass:"${{ steps.signing.outputs.key_password }}" \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"
          
          # 验证签名
          "$APK_SIGNER" verify -v --print-certs "$SIGNED_APK"
          
          echo "✅ APK signed successfully"
          ls -lh app/build/outputs/apk/release/

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: netguard-none-apk
          path: app/build/outputs/apk/release/*-signed.apk
          retention-days: 30

      - name: Cleanup Keystore
        if: always()
        run: |
          rm -f "app/${{ steps.signing.outputs.store_file }}"
          echo "Keystore cleaned up"

      - name: Upload Build Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            app/build/outputs/logs/
          retention-days: 7
