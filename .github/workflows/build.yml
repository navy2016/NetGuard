name: Build APK with Custom Package Name

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  OLD_PACKAGE: "eu.faircode.netguard"
  NEW_PACKAGE: "eu.faircode.netguard.none"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Change Application ID Only
        run: |
          sed -i "s/applicationId = \"${{ env.OLD_PACKAGE }}\"/applicationId = \"${{ env.NEW_PACKAGE }}\"/g" app/build.gradle.kts
          echo "=== Verification ==="
          grep -E "applicationId\s*=" app/build.gradle.kts || echo "WARNING: applicationId not found!"

      - name: Setup Gradle Properties
        run: |
          if ! grep -q "org.gradle.caching" gradle.properties; then
            cat >> gradle.properties << 'EOF'
          org.gradle.caching=true
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          org.gradle.daemon=false
          EOF
          fi

      - name: Disable Lint
        run: |
          if ! grep -q "lint {" app/build.gradle.kts; then
            sed -i '/android {/a\    lint {\n        disable += "ExtraTranslation"\n        disable += "MissingTranslation"\n        abortOnError = false\n        checkReleaseBuilds = false\n    }' app/build.gradle.kts
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.build.abi=arm64-v8a,armeabi-v7a,x86,x86_64 \
            -x lintVitalRelease \
            --no-daemon \
            --stacktrace

      # ✅ 简化版：解析 local.properties + 环境变量签名
      - name: Prepare Signing Config
        run: |
          # 解码 keystore
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
          ls -la app/app.key
          
          # 写入并解析 local.properties
          cat > local.properties << 'EOF'
          ${{ secrets.SIGNING_CONFIG }}
          EOF
          
          # 解析配置（去除引号和空白）
          STORE_FILE=$(grep '^storeFile=' local.properties | cut -d'=' -f2 | tr -d ' \r\n')
          STORE_PASSWORD=$(grep '^storePassword=' local.properties | sed -E 's/.*"([^"]*)".*/\1/')
          KEY_ALIAS=$(grep '^keyAlias=' local.properties | cut -d'=' -f2 | tr -d ' \r\n')
          KEY_PASSWORD=$(grep '^keyPassword=' local.properties | sed -E 's/.*"([^"]*)".*/\1/')
          
          # 验证
          if [ -z "$STORE_FILE" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Error: Failed to parse signing config"
            echo "storeFile: [$STORE_FILE]"
            echo "storePassword length: ${#STORE_PASSWORD}"
            echo "keyAlias: [$KEY_ALIAS]"
            echo "keyPassword length: ${#KEY_PASSWORD}"
            exit 1
          fi
          
          # 导出到环境变量
          echo "STORE_FILE=$STORE_FILE" >> $GITHUB_ENV
          echo "STORE_PASSWORD=$STORE_PASSWORD" >> $GITHUB_ENV
          echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV
          
          echo "✅ Config parsed: storeFile=$STORE_FILE, keyAlias=$KEY_ALIAS"

      # ✅ 使用环境变量传递密码（避免特殊字符问题）
      - name: Sign APK
        env:
          KS_PASS: ${{ env.STORE_PASSWORD }}
          KEY_PASS: ${{ env.KEY_PASSWORD }}
        run: |
          UNSIGNED_APK=$(find app/build -name "*-unsigned.apk" -type f | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "Error: Unsigned APK not found"
            find app/build -name "*.apk" -type f
            exit 1
          fi
          
          mkdir -p app/build/outputs/apk/release
          SIGNED_APK="app/build/outputs/apk/release/app-release-signed.apk"
          
          BUILD_TOOLS_VERSION=$(ls -1 ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)
          APK_SIGNER="${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/apksigner"
          
          echo "Signing: $UNSIGNED_APK -> $SIGNED_APK"
          echo "Using apksigner: $BUILD_TOOLS_VERSION"
          
          # 使用 env: 方式传递密码（处理特殊字符如 @）
          "$APK_SIGNER" sign \
            --ks "app/${{ env.STORE_FILE }}" \
            --ks-key-alias "${{ env.KEY_ALIAS }}" \
            --ks-pass "env:KS_PASS" \
            --key-pass "env:KEY_PASS" \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"
          
          # 验证
          "$APK_SIGNER" verify -v --print-certs "$SIGNED_APK"
          echo "✅ Signed successfully: $SIGNED_APK"
          ls -lh app/build/outputs/apk/release/

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: netguard-none-apk
          path: app/build/outputs/apk/release/*-signed.apk
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          rm -f app/app.key local.properties
          echo "✅ Cleanup completed"

      - name: Upload Build Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: app/build/reports/
          retention-days: 7
