name: Build APK with Custom Package Name

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Change Package Name
        run: |
          # 修改build.gradle.kts中的包名
          sed -i 's/namespace = "eu.faircode.netguard"/namespace = "eu.faircode.netguard.none"/g' app/build.gradle.kts
          sed -i 's/applicationId = "eu.faircode.netguard"/applicationId = "eu.faircode.netguard.none"/g' app/build.gradle.kts
          
          # 验证修改
          echo "Modified build.gradle.kts:"
          grep -E "(namespace|applicationId)" app/build.gradle.kts | head -5

      - name: Fix Lint ExtraTranslation Errors
        run: |
          # 禁用 ExtraTranslation lint 检查
          sed -i '/disable.add("MissingTranslation")/a\        disable.add("ExtraTranslation")' app/build.gradle.kts
          
          # 验证修改
          echo "Lint configuration:"
          grep -A3 'lint {' app/build.gradle.kts

      - name: Update Source Files Package References
        run: |
          # 查找并替换所有Java/Kotlin源文件中的包引用
          find app/src -type f \( -name "*.kt" -o -name "*.java" -o -name "*.xml" \) -exec sed -i 's/eu\.faircode\.netguard/eu.faircode.netguard.none/g' {} +
          
          # 移动源文件目录结构
          if [ -d "app/src/main/java/eu/faircode/netguard" ]; then
            mkdir -p app/src/main/java/eu/faircode/netguard/none
            cp -r app/src/main/java/eu/faircode/netguard/* app/src/main/java/eu/faircode/netguard/none/ 2>/dev/null || true
            rm -rf app/src/main/java/eu/faircode/netguard
          fi
          
          # 处理其他source sets
          for dir in app/src/*/java/eu/faircode/netguard; do
            if [ -d "$dir" ]; then
              newdir="${dir}/none"
              mkdir -p "$newdir"
              cp -r "$dir"/* "$newdir/" 2>/dev/null || true
              rm -rf "$dir"
              echo "Processed: $dir -> $newdir"
            fi
          done

      - name: Update AndroidManifest.xml References
        run: |
          if [ -f "app/src/main/AndroidManifest.xml" ]; then
            sed -i 's/eu\.faircode\.netguard/eu.faircode.netguard.none/g' app/src/main/AndroidManifest.xml
            echo "Updated AndroidManifest.xml"
          fi

      - name: Update Resource References
        run: |
          find app/src -type f -name "*.xml" -exec sed -i 's/eu\.faircode\.netguard/eu.faircode.netguard.none/g' {} +

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.build.abi=arm64-v8a,armeabi-v7a,x86,x86_64 \
            --no-daemon \
            --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: netguard-none-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Build Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: app/build/reports/
          retention-days: 7
