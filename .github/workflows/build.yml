name: Build APK with Custom Package Name

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Change Application ID Only
        run: |
          OLD_ID="eu.faircode.netguard"
          NEW_ID="eu.faircode.netguard.none"
          
          sed -i "s/applicationId = \"${OLD_ID}\"/applicationId = \"${NEW_ID}\"/g" app/build.gradle.kts
          
          echo "=== Application ID ==="
          grep "applicationId" app/build.gradle.kts
          echo "=== Namespace (unchanged) ==="
          grep "namespace" app/build.gradle.kts

      - name: Fix Lint Configuration
        run: |
          if grep -q "lint {" app/build.gradle.kts; then
            sed -i '/disable.add("MissingTranslation")/a\        disable.add("ExtraTranslation")' app/build.gradle.kts
          else
            sed -i '/android {/a\    lint {\n        disable.add("MissingTranslation")\n        disable.add("ExtraTranslation")\n    }' app/build.gradle.kts
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.build.abi=arm64-v8a,armeabi-v7a,x86,x86_64 \
            --no-daemon \
            --stacktrace

      - name: Parse Signing Config & Sign APK
        run: |
          # 解析 SIGNING_CONFIG
          CONFIG="${{ secrets.SIGNING_CONFIG }}"
          
          # 提取各字段
          STORE_FILE=$(echo "$CONFIG" | grep -o 'storeFile=[^ ]*' | cut -d'=' -f2)
          STORE_PASSWORD=$(echo "$CONFIG" | grep -o 'storePassword="[^"]*"' | cut -d'"' -f2)
          KEY_ALIAS=$(echo "$CONFIG" | grep -o 'keyAlias=[^ ]*' | cut -d'=' -f2)
          KEY_PASSWORD=$(echo "$CONFIG" | grep -o 'keyPassword="[^"]*"' | cut -d'"' -f2)
          
          echo "Store file: $STORE_FILE"
          echo "Key alias: $KEY_ALIAS"
          
          # 解码密钥文件
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > "app/$STORE_FILE"
          
          # 找到未签名 APK
          UNSIGNED_APK=$(find app/build -name "*-unsigned.apk" -type f | head -1)
          echo "Found unsigned APK: $UNSIGNED_APK"
          
          # 创建输出目录
          mkdir -p app/build/outputs/apk/release
          
          # 签名 APK
          SIGNED_APK="app/build/outputs/apk/release/app-release-signed.apk"
          
          ${ANDROID_HOME}/build-tools/33.0.0/apksigner sign \
            --ks "app/$STORE_FILE" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$STORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"
          
          echo "APK signed successfully: $SIGNED_APK"
          ls -lh app/build/outputs/apk/release/

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: netguard-none-apk
          path: app/build/outputs/apk/release/*-signed.apk
          retention-days: 30

      - name: Cleanup Keystore
        if: always()
        run: |
          # 从配置中提取文件名并删除
          STORE_FILE=$(echo "${{ secrets.SIGNING_CONFIG }}" | grep -o 'storeFile=[^ ]*' | cut -d'=' -f2)
          rm -f "app/$STORE_FILE"

      - name: Upload Build Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: app/build/reports/
          retention-days: 7

