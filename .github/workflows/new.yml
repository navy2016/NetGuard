name: Build APK with Custom Package Name

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  OLD_PACKAGE: "eu.faircode.netguard"
  NEW_PACKAGE: "eu.faircode.netguard.none"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Change Application ID Only
        run: |
          sed -i "s/applicationId = \"${{ env.OLD_PACKAGE }}\"/applicationId = \"${{ env.NEW_PACKAGE }}\"/g" app/build.gradle.kts
          echo "=== Verification ==="
          grep -E "applicationId\s*=" app/build.gradle.kts || echo "WARNING: applicationId not found!"

      # ✅ 关键修复：增加 JVM 内存 + 禁用 testOnly 标记
      - name: Setup Gradle Properties
        run: |
          cat > gradle.properties << 'EOF'
          # Gradle 性能优化
          org.gradle.caching=true
          org.gradle.parallel=true
          org.gradle.configureondemand=true
          org.gradle.daemon=false
          
          # ✅ 关键：增加 JVM 堆内存（解决 R8 OOM）
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          
          # Android 配置
          android.useAndroidX=true
          android.enableJetifier=true
          android.injected.testOnly=false
          
          # ✅ R8 内存优化
          android.enableR8.fullMode=false
          EOF
          cat gradle.properties

      - name: Disable Lint
        run: |
          if ! grep -q "lint {" app/build.gradle.kts; then
            sed -i '/android {/a\    lint {\n        disable += "ExtraTranslation"\n        disable += "MissingTranslation"\n        abortOnError = false\n        checkReleaseBuilds = false\n    }' app/build.gradle.kts
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ✅ 确保构建 Release 版本（优化内存参数）
      - name: Build Release APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          # ✅ 关键：为 Gradle 守护进程设置内存
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.build.abi=arm64-v8a,armeabi-v7a,x86,x86_64 \
            -x lintVitalRelease \
            --no-daemon \
            --stacktrace \
            --max-workers=2

      - name: Prepare Signing Config
        run: |
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
          ls -la app/app.key
          
          cat > local.properties << 'EOF'
          ${{ secrets.SIGNING_CONFIG }}
          EOF
          
          STORE_FILE=$(grep '^storeFile=' local.properties | cut -d'=' -f2 | tr -d ' \r\n')
          STORE_PASSWORD=$(grep '^storePassword=' local.properties | sed -E 's/.*"([^"]*)".*/\1/')
          KEY_ALIAS=$(grep '^keyAlias=' local.properties | cut -d'=' -f2 | tr -d ' \r\n')
          KEY_PASSWORD=$(grep '^keyPassword=' local.properties | sed -E 's/.*"([^"]*)".*/\1/')
          
          echo "STORE_FILE=$STORE_FILE" >> $GITHUB_ENV
          echo "STORE_PASSWORD=$STORE_PASSWORD" >> $GITHUB_ENV
          echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV

      - name: Sign APK
        env:
          KS_PASS: ${{ env.STORE_PASSWORD }}
          KEY_PASS: ${{ env.KEY_PASSWORD }}
        run: |
          UNSIGNED_APK=$(find app/build -name "*-unsigned.apk" -type f | head -1)
          mkdir -p app/build/outputs/apk/release
          SIGNED_APK="app/build/outputs/apk/release/app-release-signed.apk"
          
          BUILD_TOOLS_VERSION=$(ls -1 ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)
          APK_SIGNER="${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/apksigner"
          
          "$APK_SIGNER" sign \
            --ks "app/${{ env.STORE_FILE }}" \
            --ks-key-alias "${{ env.KEY_ALIAS }}" \
            --ks-pass "env:KS_PASS" \
            --key-pass "env:KEY_PASS" \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"
          
          "$APK_SIGNER" verify -v --print-certs "$SIGNED_APK"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: netguard-none-apk
          path: app/build/outputs/apk/release/*-signed.apk
          retention-days: 30

      - name: Cleanup
        if: always()
        run: rm -f app/app.key local.properties

